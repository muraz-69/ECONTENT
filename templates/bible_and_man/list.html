{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2 class="text-center">Bible & Man Resources</h2>
    <div class="row">
        {% for resource in resources %}
        <div class="col-md-4">
            <div class="card h-100">
                {% if resource.image %}
                <img src="{{ resource.image.url }}" class="card-img-top" alt="Resource Image">
                {% endif %}
                <div class="card-body text-center">
                    <h5 class="card-title">{{ resource.title }}</h5>
                    <p class="card-text">{{ resource.description|truncatewords:20 }}</p>
                    <a href="{% url 'bible_and_man_detail' resource.pk %}" class="btn btn-primary">View</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No resources available.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
